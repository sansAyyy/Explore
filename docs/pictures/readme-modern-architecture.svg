<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1240" viewBox="0 0 1600 1240" role="img" aria-labelledby="title desc">
  <title id="title">Explore 项目详细架构图</title>
  <desc id="desc">Explore 多应用仓库的现代扁平化架构图，展示用户入口、前端应用、边缘代理、API Gateway、业务服务、共享基础模块、契约、数据中间件、Docker 与测试。</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e5e7eb" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 2 L 10 6 L 2 10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 2 L 10 6 L 2 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 2 L 10 6 L 2 10 Z" fill="#059669"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .grid { fill: url(#grid); }
      .title { font: 700 34px "Segoe UI", Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px "Segoe UI", Arial, "Microsoft YaHei", sans-serif; fill: #64748b; }
      .section-title { font: 700 16px "Segoe UI", Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .card-title { font: 700 18px "Segoe UI", Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .card-subtitle { font: 500 13px "Segoe UI", Arial, "Microsoft YaHei", sans-serif; fill: #64748b; }
      .body { font: 400 13px "Segoe UI", Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 400 12px "Segoe UI", Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .mono { font: 600 12px Consolas, "SFMono-Regular", monospace; fill: #334155; }
      .badge { font: 600 11px "Segoe UI", Arial, "Microsoft YaHei", sans-serif; }
      .shell { fill: rgba(255,255,255,0.78); stroke: #cbd5e1; stroke-width: 1; }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1; filter: url(#softShadow); }
      .mini { fill: #f8fafc; stroke: #dbe3ef; stroke-width: 1; }
      .edge { fill: #fff7ed; stroke: #fed7aa; }
      .gateway { fill: #eef2ff; stroke: #c7d2fe; }
      .service { fill: #ecfdf5; stroke: #a7f3d0; }
      .data { fill: #fdf2f8; stroke: #fbcfe8; }
      .shared { fill: #f1f5f9; stroke: #cbd5e1; }
      .test { fill: #faf5ff; stroke: #e9d5ff; }
      .line { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
      .line-blue { fill: none; stroke: #2563eb; stroke-width: 2.4; marker-end: url(#arrowBlue); }
      .line-green { fill: none; stroke: #059669; stroke-width: 2.4; marker-end: url(#arrowGreen); }
      .line-dashed { fill: none; stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .chip-blue { fill: #dbeafe; stroke: #bfdbfe; }
      .chip-green { fill: #d1fae5; stroke: #a7f3d0; }
      .chip-orange { fill: #ffedd5; stroke: #fed7aa; }
      .chip-pink { fill: #fce7f3; stroke: #fbcfe8; }
      .chip-slate { fill: #e2e8f0; stroke: #cbd5e1; }
      .chip-violet { fill: #ede9fe; stroke: #ddd6fe; }
      .accent-blue { fill: #2563eb; }
      .accent-green { fill: #059669; }
      .accent-orange { fill: #f97316; }
      .accent-pink { fill: #db2777; }
      .accent-violet { fill: #7c3aed; }
      .accent-slate { fill: #475569; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1240"/>
  <rect class="grid" width="1600" height="1240"/>

  <text x="56" y="58" class="title">Explore 项目详细架构图</text>
  <text x="56" y="86" class="subtitle">前后端一体多应用仓库：Vue / uni-app 前端、YARP 网关、.NET 服务、BuildingBlocks、契约、数据库与消息中间件</text>

